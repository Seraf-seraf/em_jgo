services:
  postgres:
    image: postgres:18
    container_name: subscriptions-postgres
    environment:
      POSTGRES_DB: subscriptions
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d subscriptions"]
      interval: 5s
      timeout: 3s
      retries: 20

  subscriptions:
    build:
      context: .
      dockerfile: build/Dockerfile
    container_name: subscriptions-service
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - subscriptions_logs:/app/var/log/subscriptions
    environment:
      APP_POSTGRES_HOST: postgres
      TZ: UTC
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz | grep -qx 'ok'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
  subscriptions_logs:
